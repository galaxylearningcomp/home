<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Computer Learning Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        .font-cursive { font-family: 'Great Vibes', cursive; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-white shadow-md p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <img src="logo.png" alt="Logo" class="w-12 h-12">
            <span class="font-bold text-xl text-blue-900">GCLC</span>
        </div>
        <div class="space-x-6 text-sm font-semibold text-gray-700">
            <a href="#home">Home</a>
            <a href="#courses">Courses</a>
            <a href="#verify">Verify</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <section id="home" class="py-20 text-center">
        <h1 class="text-4xl font-bold text-gray-900">Welcome to Galaxy Computer Learning Center</h1>
    </section>

    <section id="courses" class="py-20 bg-white text-center">
        <h2 class="text-3xl font-bold">Our Courses</h2>
    </section>

    <section id="verify" class="py-20 bg-gray-100 px-4">
        <div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg text-center">
            <h2 class="text-2xl font-bold mb-4">Certificate Verification</h2>
            <input type="text" id="certNumber" placeholder="Enter Certificate No" class="w-full p-3 border rounded-lg mb-4">
            <button id="searchBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700">Search</button>
            
            <div id="downloadArea" class="hidden mt-6">
                <button id="downloadImageBtn" class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700">Download Certificate</button>
            </div>
        </div>

        <div id="certificateContainer" class="hidden mt-10 flex justify-center">
            <div id="certificateTemplate" class="w-[900px] h-[630px] p-8 bg-white border-[16px] border-double border-gray-800 text-center shadow-2xl relative">
                <img src="logo.png" class="w-28 h-28 mx-auto mb-4" id="certLogo">
                <h1 class="text-3xl font-bold uppercase">GALAXY COMPUTER LEARNING CENTER</h1>
                <h2 id="pdfName" class="text-5xl font-cursive mt-10">Student Name</h2>
                <p class="mt-4">Course: <span id="pdfCourse" class="font-bold"></span></p>
                
                <div class="absolute bottom-10 left-10 text-left">
                    <p>Date: <span id="pdfDate"></span></p>
                    <p>ID: <span id="pdfCertId"></span></p>
                </div>
                
                <div class="absolute bottom-10 right-10 text-center">
                    <img src="sign.png" class="w-48 h-24 mx-auto" id="certSig">
                    <div class="border-t-2 border-gray-800 w-40 mt-2 font-bold">Director</div>
                </div>
            </div>
        </div>
    </section>

    <section id="contact" class="py-20 text-center">
        <h2 class="text-3xl font-bold">Contact Us</h2>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const db = getFirestore(initializeApp({ apiKey: "AIzaSyD74cf-EyzOowdrKncNYAN29wnTVrGu5Vo", projectId: "rabia-technical-institute" }));

        document.getElementById('searchBtn').onclick = async () => {
            const id = document.getElementById('certNumber').value.trim().toUpperCase();
            const snap = await getDoc(doc(db, "certificates", id));
            if (snap.exists()) {
                const data = snap.data();
                document.getElementById('pdfName').innerText = data.name;
                document.getElementById('pdfCourse').innerText = data.course;
                document.getElementById('pdfDate').innerText = data.date;
                document.getElementById('pdfCertId').innerText = id;
                document.getElementById('certificateContainer').classList.remove('hidden');
                document.getElementById('downloadArea').classList.remove('hidden');
            } else { alert("Certificate not found!"); }
        };

        document.getElementById('downloadImageBtn').onclick = () => {
            const element = document.getElementById('certificateTemplate');
            html2canvas(element, { scale: 2, useCORS: true, allowTaint: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Certificate.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        };
    </script>
</body>
</html>
