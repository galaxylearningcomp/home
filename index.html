<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Computer Learning Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-gray-50">

    <nav class="bg-blue-900 text-white p-4 flex items-center shadow-md">
        <img src="logo.png" alt="Logo" class="w-12 h-12 mr-4 rounded bg-white p-1">
        <h1 class="text-2xl font-bold">GALAXY COMPUTER LEARNING CENTER</h1>
    </nav>

    <section id="verify" class="py-12 bg-white px-6">
        <div class="max-w-md mx-auto bg-gray-100 p-8 rounded-xl shadow-lg text-center">
            <h2 class="text-2xl font-bold mb-4">Verify Certificate</h2>
            <input type="text" id="certNumber" placeholder="Enter Certificate ID" class="w-full p-3 border rounded mb-4">
            <button id="searchBtn" class="w-full bg-blue-600 text-white py-3 rounded font-bold hover:bg-blue-700">Search</button>
            
            <div id="downloadArea" class="hidden mt-4">
                <button id="downloadBtn" class="w-full bg-green-600 text-white py-3 rounded font-bold">Download Certificate</button>
            </div>
        </div>

        <div id="certWrapper" class="hidden mt-10 flex justify-center">
            <div id="certificate" class="w-[800px] bg-white p-12 border-[20px] border-blue-900 shadow-2xl relative">
                <div class="text-center">
                    <img src="logo.png" class="w-24 h-24 mx-auto mb-4" alt="Logo">
                    <h1 class="text-4xl font-bold text-blue-900">CERTIFICATE OF COMPLETION</h1>
                    <p class="text-gray-600 mt-2">This is to certify that</p>
                    <h2 id="pdfName" class="text-3xl font-bold my-4 uppercase text-blue-800">Student Name</h2>
                    <p>has successfully completed the course</p>
                    <h3 id="pdfCourse" class="text-2xl font-bold my-4">Course Name</h3>
                    
                    <div class="text-left mt-6 text-sm">
                        <p><strong>Certificate ID:</strong> <span id="pdfID"></span></p>
                        <p><strong>Date of Issue:</strong> <span id="pdfDate"></span></p>
                    </div>

                    <div class="flex justify-between items-end mt-12">
                        <div id="qrcode" class="w-24 h-24"></div>
                        <div class="text-center">
                            <img src="signature.png" class="w-32 mx-auto mb-2" alt="Signature">
                            <p class="font-bold border-t-2 border-black">Director Signature</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD74cf-EyzOowdrKncNYAN29wnTVrGu5Vo",
            projectId: "rabia-technical-institute"
        };
        const db = getFirestore(initializeApp(firebaseConfig));

        document.getElementById('searchBtn').onclick = async () => {
            const id = document.getElementById('certNumber').value.trim().toUpperCase();
            if(!id) return alert("Please enter an ID");
            
            const snap = await getDoc(doc(db, "certificates", id));
            
            if (snap.exists()) {
                const data = snap.data();
                document.getElementById('pdfName').innerText = data.name;
                document.getElementById('pdfCourse').innerText = data.course;
                document.getElementById('pdfID').innerText = id;
                document.getElementById('pdfDate').innerText = data.date || "29 May 2026";
                
                document.getElementById('certWrapper').classList.remove('hidden');
                document.getElementById('downloadArea').classList.remove('hidden');
                
                document.getElementById("qrcode").innerHTML = "";
                new QRCode(document.getElementById("qrcode"), "https://galaxylearningcomp.github.io/home/");
            } else {
                alert("Certificate not found!");
            }
        };

        document.getElementById('downloadBtn').onclick = () => {
            html2canvas(document.getElementById('certificate')).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Certificate.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        };
    </script>
</body>
</html>
