<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCLC - एडमिन पैनल</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen text-slate-100 flex flex-col justify-between">

    <header class="bg-slate-800 border-b border-slate-700 py-4 px-6 flex justify-between items-center shadow-lg">
        <div class="flex items-center space-x-3">
            <div class="w-8 h-8 bg-amber-500 rounded-lg flex items-center justify-center font-bold text-slate-950">A</div>
            <h1 class="text-lg font-bold tracking-wide">GCLC मैनेजमेंट कंट्रोल</h1>
        </div>
        <span class="text-xs bg-amber-500/10 text-amber-400 border border-amber-500/30 font-medium px-3 py-1 rounded-full">Secure Live Mode</span>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-slate-800 rounded-2xl shadow-2xl p-8 border border-slate-700">
            <h2 class="text-xl font-bold text-white mb-2">नया सर्टिफिकेट जनरेट करें</h2>
            <p class="text-xs text-slate-400 mb-6">यहाँ भरी गई जानकारी तुरंत मुख्य वेबसाइट पर लाइव उपलब्ध हो जाएगी।</p>

            <form id="addStudentForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">सर्टिफिकेट / रोल नंबर</label>
                    <input type="text" id="certId" placeholder="उदा. GCLC-2026-001" required class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white uppercase focus:outline-none focus:ring-2 focus:ring-amber-500">
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">छात्र का नाम (Student Name)</label>
                    <input type="text" id="studentName" placeholder="पूरा नाम दर्ज करें" required class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-amber-500">
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">कोर्स का नाम (Course Name)</label>
                    <input type="text" id="courseName" placeholder="उदा. Advance Diploma in Computer Application" required class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-amber-500">
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">जारी करने की तिथि (Issue Date)</label>
                    <input type="date" id="issueDate" required class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-amber-500">
                </div>

                <button type="submit" class="w-full bg-gradient-to-r from-amber-500 to-orange-500 text-slate-950 font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-amber-500/10 hover:from-amber-600 hover:to-orange-600 transition duration-200 mt-2">सर्टिफिकेट जारी करें</button>
            </form>
        </div>
    </main>

    <footer class="text-center py-4 text-xs text-slate-600 border-t border-slate-800">
        GCLC Admin Area &copy; 2026
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        // Your Firebase Config Automatically Injected
        const firebaseConfig = {
            apiKey: "AIzaSyD74cf-EyzOowdrKncNYAN29wnTVrGu5Vo",
            authDomain: "rabia-technical-institute.firebaseapp.com",
            projectId: "rabia-technical-institute",
            storageBucket: "rabia-technical-institute.firebasestorage.app",
            messagingSenderId: "262545574513",
            appId: "1:262545574513:web:fcc0b1f66c45c35952a9d0",
            measurementId: "G-KLECGT16V0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Save data to Firebase Firestore
        document.getElementById('addStudentForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const certId = document.getElementById('certId').value.trim().toUpperCase();
            const name = document.getElementById('studentName').value.trim();
            const course = document.getElementById('courseName').value.trim();
            const rawDate = document.getElementById('issueDate').value;

            // Format date to DD/MM/YYYY for professional look
            const dateObj = new Date(rawDate);
            const formattedDate = `${String(dateObj.getDate()).padStart(2, '0')}/${String(dateObj.getMonth() + 1).padStart(2, '0')}/${dateObj.getFullYear()}`;

            try {
                // Upload to "certificates" collection in Firebase Firestore
                await setDoc(doc(db, "certificates", certId), {
                    name: name,
                    course: course,
                    date: formattedDate
                });

                alert(`सफलतापूर्वक दर्ज किया गया!\nसर्टिफिकेट नंबर ${certId} अब वेबसाइट पर लाइव है।`);
                document.getElementById('addStudentForm').reset();

            } catch (error) {
                alert("डेटा सेव करने में त्रुटि हुई! कृपया अपने Firestore Database Rules की जाँच करें।");
                console.error("Error writing document: ", error);
            }
        });
    </script>
</body>
</html>
